<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestão de Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f14;
  --surface:  #161920;
  --card:     #1e2230;
  --border:   #2a2f42;
  --accent:   #4f8ef7;
  --accent2:  #7c5cfc;
  --green:    #22d3a0;
  --orange:   #f59e42;
  --red:      #f75a5a;
  --text:     #e8eaf2;
  --muted:    #7a7f9a;
  --radius:   16px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ══════════════════════════════════════
   MOBILE (padrão)
══════════════════════════════════════ */
body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(79,142,247,.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 80% 80%, rgba(124,92,252,.10) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* APP MOBILE */
.app {
  position:relative; z-index:1;
  width:100%; max-width:440px;
  min-height:100vh;
  display:flex; flex-direction:column;
  padding-bottom:88px;
}

/* HEADER */
.header { padding:28px 24px 20px; display:flex; align-items:center; gap:14px; }
.header-icon {
  width:44px; height:44px; border-radius:12px; flex-shrink:0; font-size:22px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(79,142,247,.35);
}
.header-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; letter-spacing:-.3px; }
.header-sub   { font-size:13px; color:var(--muted); margin-top:2px; }

/* CONTENT */
.content { flex:1; padding:0 20px; }
.section-title {
  font-family:'Syne',sans-serif; font-size:11px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:24px 0 10px;
}

/* CARDS MENU */
.menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.menu-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px 16px; cursor:pointer; transition:all .2s;
  display:flex; flex-direction:column; gap:8px; position:relative; overflow:hidden; user-select:none;
}
.menu-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(79,142,247,.07),transparent); opacity:0; transition:.2s;
}
.menu-card:hover { transform:translateY(-2px); border-color:rgba(79,142,247,.5); }
.menu-card:hover::before { opacity:1; }
.menu-card:active { transform:scale(.97); }
.menu-card .icon  { font-size:26px; }
.menu-card .label { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; }
.menu-card .desc  { font-size:12px; color:var(--muted); }
.menu-card.wide { grid-column:1/-1; flex-direction:row; align-items:center; gap:14px; padding:16px 20px; }
.menu-card.wide .icon  { font-size:22px; }
.menu-card.wide .label { font-size:15px; }
.menu-card.danger { border-color:rgba(247,90,90,.2); }
.menu-card.danger:hover { border-color:rgba(247,90,90,.6); }
.menu-card.danger .icon, .menu-card.danger .label { color:var(--red); }

/* BUSCA */
.search-wrap { position:relative; }
.input-icon-wrap { position:relative; }
.search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; opacity:.5; }
.search-input {
  width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:14px 16px 14px 42px; font-size:16px; color:var(--text); font-family:'DM Sans',sans-serif;
  transition:.2s; outline:none;
}
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.15); }
.search-input::placeholder { color:var(--muted); }

/* AUTOCOMPLETE */
.autocomplete-list {
  position:absolute; top:calc(100% + 6px); left:0; right:0;
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; z-index:100; box-shadow:0 12px 40px rgba(0,0,0,.5); display:none;
}
.autocomplete-list.open { display:block; }
.autocomplete-item {
  padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:12px;
  transition:.12s; border-bottom:1px solid var(--border); font-size:14px;
}
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover, .autocomplete-item.active { background:rgba(79,142,247,.12); }
.item-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.item-name { font-size:15px; font-weight:500; flex:1; }
.item-price { font-size:13px; color:var(--accent); font-weight:600; white-space:nowrap; }

/* RESULTADO */
.result-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; margin-top:16px; animation:slideUp .25s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.result-header { background:linear-gradient(135deg,var(--accent),var(--accent2)); padding:20px 22px; }
.result-nome { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; }
.result-id   { font-size:12px; color:rgba(255,255,255,.55); margin-top:4px; }
.result-body { padding:14px; display:flex; flex-direction:column; gap:8px; }
.result-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px; background:var(--surface); border-radius:10px;
}
.rlabel { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px; }
.rvalue { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; }
.rvalue.preco    { color:var(--text); }
.rvalue.estoque  { color:var(--green); }
.rvalue.validade { color:var(--orange); }

/* FORMULÁRIOS */
.form-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-top:12px; }
.form-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; margin-bottom:18px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.07em; text-transform:uppercase; margin-bottom:6px; }
.field input, .field select {
  width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:13px 14px; font-size:15px; color:var(--text); font-family:'DM Sans',sans-serif;
  transition:.2s; outline:none; appearance:none;
}
.field input:focus, .field select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.12); }
.field input::placeholder { color:var(--muted); }
.field select option { background:var(--card); }

/* BOTÕES */
.btn {
  width:100%; padding:15px; border-radius:12px; border:none;
  font-size:15px; font-weight:700; font-family:'Syne',sans-serif;
  cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 4px 20px rgba(79,142,247,.3); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 26px rgba(79,142,247,.4); }
.btn-primary:active { transform:scale(.98); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); margin-top:10px; }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn-danger { background:rgba(247,90,90,.1); color:var(--red); border:1px solid rgba(247,90,90,.25); }
.btn-danger:hover { background:rgba(247,90,90,.2); }

/* TOAST */
#toast {
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(16px);
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:11px 20px; font-size:14px; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,.5);
  opacity:0; pointer-events:none; transition:opacity .25s,transform .25s;
  white-space:nowrap; z-index:999;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.sucesso { border-color:rgba(34,211,160,.4); color:var(--green); }
#toast.erro    { border-color:rgba(247,90,90,.4); color:var(--red); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center; z-index:500; padding:20px;
  opacity:0; pointer-events:none; transition:.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 24px;
  width:100%; max-width:360px;
  transform:scale(.94) translateY(10px); transition:.25s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal { transform:scale(1) translateY(0); }
.modal-icon  { font-size:44px; text-align:center; margin-bottom:12px; }
.modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; text-align:center; margin-bottom:6px; }
.modal-desc  { font-size:14px; color:var(--muted); text-align:center; margin-bottom:20px; line-height:1.5; }
.pass-wrap   { position:relative; margin-bottom:12px; }
.pass-input  {
  width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:13px 46px 13px 14px; font-size:16px; color:var(--text); font-family:'DM Sans',sans-serif;
  outline:none; transition:.2s;
}
.pass-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.12); }
.pass-input::placeholder { color:var(--muted); }
.pass-toggle {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--muted);
  display:flex; align-items:center; padding:4px; transition:color .15s;
}
.pass-toggle:hover { color:var(--text); }
.pass-toggle svg { width:18px; height:18px; }
.modal-err { font-size:13px; color:var(--red); text-align:center; margin-bottom:10px; display:none; }
.modal-actions { display:flex; gap:10px; }
.modal-actions .btn { flex:1; margin-top:0; }

/* NAV MOBILE */
.nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:440px;
  background:rgba(20,23,32,.94); backdrop-filter:blur(20px);
  border-top:1px solid var(--border); display:flex; padding:10px 16px 18px; gap:4px; z-index:200;
}
.nav-btn {
  flex:1; background:none; border:none; padding:10px 8px; border-radius:12px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  cursor:pointer; transition:.2s; color:var(--muted); font-family:'DM Sans',sans-serif;
}
.nav-btn:hover  { color:var(--text); background:rgba(255,255,255,.04); }
.nav-btn.active { color:var(--accent); background:rgba(79,142,247,.1); }
.nav-icon  { font-size:20px; line-height:1; }
.nav-label { font-size:11px; font-weight:500; }

/* MISC */
.loading-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; padding:60px 20px; color:var(--muted); }
.spinner { width:34px; height:34px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.empty { text-align:center; padding:32px 20px; color:var(--muted); }
.empty .e-icon { font-size:36px; margin-bottom:10px; }
.empty .e-text { font-size:15px; }
.divider { height:1px; background:var(--border); margin:20px 0; }
.destaque-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px; background:var(--card); border-radius:10px;
  margin-bottom:8px; cursor:pointer; border:1px solid var(--border); transition:.15s;
}
.destaque-row:hover { border-color:rgba(79,142,247,.4); }
.destaque-row .d-nome  { font-size:15px; font-weight:500; }
.destaque-row .d-preco { font-size:14px; color:var(--accent); font-weight:700; }


/* ── PC: centraliza como card, mantém largura de celular ── */
@media (min-width: 640px) {
  body {
    align-items: flex-start;
    justify-content: center;
  }
  .app {
    max-width: 440px;
    width: 100%;
    min-height: 100vh;
  }
  .nav {
    max-width: 440px;
  }
}
</style>
</head>
<body>

<!-- MODAL (compartilhado) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon"    id="modalIcon"></div>
    <div class="modal-title"   id="modalTitle"></div>
    <div class="modal-desc"    id="modalDesc"></div>
    <div id="modalBody"></div>
    <div class="modal-err"     id="modalErr"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ──
const PLANILHA_ID        = '1LxDTFAteG6bJppvJOp_9SnMBA72-1hEtyy9NCbRrl48';
const API_URL_LEITURA    = `https://opensheet.elk.sh/${PLANILHA_ID}/1`;
const SCRIPT_URL_ESCRITA = 'https://script.google.com/macros/s/AKfycbyTJEfr1u5zrKBXN9Jt0CpC66UAFpnHl05iYih5gqXYHUC9tY5lgxCqZ4gYEo2t-gHp/exec';
const ADMIN_PASSWORD     = 'admin123';

let produtos     = [];
let usuarioAdmin = false;

// detecta se está no desktop
const isDesktop = () => window.innerWidth >= 860;

// ── INIT ──
async function inicializar() {
  await carregarProdutos();
  mostrarInicio();
}

// ── HELPERS NAV ──
function setNav(id) {
  // mobile
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nm = document.getElementById('nav-' + id);
  if (nm) nm.classList.add('active');
  // desktop
  document.querySelectorAll('.d-nav-btn').forEach(b => b.classList.remove('active'));
  const nd = document.getElementById('dn-' + id);
  if (nd) nd.classList.add('active');
}

function setHeader(icon, title, sub) {
  // mobile
  document.getElementById('headerIcon').textContent  = icon;
  document.getElementById('headerTitle').textContent = title;
  document.getElementById('headerSub').textContent   = sub;
  // desktop
  document.getElementById('dPageTitle').textContent = title;
  document.getElementById('dPageSub').textContent   = sub;
}

// retorna o container de conteúdo ativo
function getContent() {
  return isDesktop()
    ? document.getElementById('dContent')
    : document.getElementById('content');
}
function setContent(html) { getContent().innerHTML = html; }

// ── CARREGAR ──
async function carregarProdutos() {
  try {
    const r = await fetch(API_URL_LEITURA);
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (!d || !d.length) { produtos = []; return; }
    produtos = d.map(i => ({
      id:       String(i.id       || i.ID       || '').trim(),
      nome:     String(i.nome     || i.Nome     || i.produto || i.Produto || '').trim(),
      preco:    String(i['preco ']|| i.preco    || i.Preco  || i['preço'] || '0').trim(),
      estoque:  String(i.estoque  || i.Estoque  || '').trim(),
      validade: String(i.validade || i.Validade || '').trim()
    })).filter(p => p.nome);
  } catch(e) { produtos = []; }
}

// ── SALVAR ──
async function salvarNoSheet(dados) {
  try {
    const r = await fetch(SCRIPT_URL_ESCRITA, {
      method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(dados)
    });
    return (await r.json()).success === true;
  } catch(e) { return false; }
}

// ── MODAL ──
function abrirModal({ icon='', title='', desc='', body='', actions=[] }) {
  document.getElementById('modalIcon').textContent  = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent  = desc;
  document.getElementById('modalBody').innerHTML    = body;
  document.getElementById('modalErr').style.display = 'none';
  document.getElementById('modalActions').innerHTML = actions.map(a =>
    `<button class="btn ${a.cls||'btn-ghost'}" onclick="${a.fn}">${a.label}</button>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => { const i = document.querySelector('#modalBody input'); if(i) i.focus(); }, 200);
}
function fecharModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') fecharModal();
});

// ── TOAST ──
let _tt;
function toast(msg, tipo='sucesso') {
  const el = document.getElementById('toast');
  clearTimeout(_tt);
  el.className = ''; el.textContent = msg;
  el.classList.add('show', tipo);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ══════════════════════════════════
// INÍCIO
// ══════════════════════════════════
function mostrarInicio() {
  setNav('inicio');
  setHeader('🏪','Gestão de Produtos',
    `${produtos.length} produto${produtos.length!==1?'s':''} cadastrado${produtos.length!==1?'s':''}`);

  if (isDesktop()) {
    // desktop: KPI + tabela
    const total       = produtos.length;
    const comEstoque  = produtos.filter(p => p.estoque && p.estoque !== '0').length;
    const comValidade = produtos.filter(p => p.validade).length;

    let tabela = produtos.length === 0
      ? `<div class="empty"><div class="e-icon">📦</div><div class="e-text">Nenhum produto cadastrado ainda</div></div>`
      : `<div class="prod-table">
          <div class="prod-head"><span>Produto</span><span>Preço</span><span>Estoque</span><span>Validade</span></div>
          ${produtos.map(p=>`
            <div class="prod-row" onclick="irParaProduto('${p.id}')">
              <span class="pt-name">${p.nome}</span>
              <span class="pt-price">R$ ${parseFloat(p.preco||0).toFixed(2)}</span>
              <span class="${p.estoque?'pt-stock':'pt-muted'}">${p.estoque||'—'}</span>
              <span class="${p.validade?'pt-exp':'pt-muted'}">${p.validade||'—'}</span>
            </div>`).join('')}
        </div>`;

    setContent(`
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-lbl">Total</div><div class="kpi-val blue">${total}</div></div>
        <div class="kpi-card"><div class="kpi-lbl">Com estoque</div><div class="kpi-val green">${comEstoque}</div></div>
        <div class="kpi-card"><div class="kpi-lbl">Com validade</div><div class="kpi-val orange">${comValidade}</div></div>
      </div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px">Todos os produtos</div>
      ${tabela}`);
  } else {
    // mobile: cards + destaques
    let destaques = produtos.length === 0
      ? `<div class="empty"><div class="e-icon">📦</div><div class="e-text">Nenhum produto ainda</div></div>`
      : produtos.slice(0,4).map(p=>`
          <div class="destaque-row" onclick="irParaProduto('${p.id}')">
            <span class="d-nome">${p.nome}</span>
            <span class="d-preco">R$ ${parseFloat(p.preco||0).toFixed(2)}</span>
          </div>`).join('');

    setContent(`
      <p class="section-title">Acesso rápido</p>
      <div class="menu-grid">
        <div class="menu-card" onclick="mostrarConsulta()">
          <span class="icon">🔍</span><span class="label">Consultar</span><span class="desc">Preços e estoque</span>
        </div>
        <div class="menu-card" onclick="abrirAdmin()">
          <span class="icon">⚙️</span><span class="label">Admin</span><span class="desc">Gerenciar produtos</span>
        </div>
      </div>
      <p class="section-title" style="margin-top:26px">Produtos recentes</p>
      ${destaques}`);
  }
}

function irParaProduto(id) {
  const p = produtos.find(x => x.id === id);
  if (!p) return;
  mostrarConsulta();
  setTimeout(() => {
    const inp = document.getElementById('nomeBusca');
    if (inp) { inp.value = p.nome; mostrarResultadoConsulta(p); }
  }, 30);
}

// ══════════════════════════════════
// CONSULTA COM AUTOCOMPLETE
// ══════════════════════════════════
function mostrarConsulta() {
  setNav('busca');
  setHeader('🔍','Buscar Produto','Digite o nome do produto');
  setContent(`
    <p class="section-title" style="${isDesktop()?'margin-top:0':''} ">Pesquisar</p>
    <div class="search-wrap">
      <div class="input-icon-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="nomeBusca"
          placeholder="Ex: Café, Coca-cola..."
          autocomplete="off"
          oninput="filtrarAuto()"
          onkeydown="handleKey(event)">
        <div class="autocomplete-list" id="autoList"></div>
      </div>
    </div>
    <div id="resultadoArea"></div>`);
  document.getElementById('nomeBusca').focus();
}

let _autoIdx = -1;
function filtrarAuto() {
  const val  = (document.getElementById('nomeBusca').value||'').trim().toLowerCase();
  const list = document.getElementById('autoList');
  _autoIdx = -1;
  if (!val) { list.classList.remove('open'); return; }
  const hits = produtos.filter(p => p.nome && p.nome.toLowerCase().includes(val)).slice(0,7);
  if (!hits.length) { list.classList.remove('open'); return; }
  list.innerHTML = hits.map((p,i)=>`
    <div class="autocomplete-item" data-id="${p.id}" data-i="${i}" onmousedown="selecionarItem('${p.id}')">
      <span class="item-dot"></span>
      <span class="item-name">${hl(p.nome,val)}</span>
      <span class="item-price">R$ ${parseFloat(p.preco||0).toFixed(2)}</span>
    </div>`).join('');
  list.classList.add('open');
}
function hl(nome, q) {
  const i = nome.toLowerCase().indexOf(q);
  if (i<0) return nome;
  return nome.slice(0,i)+`<strong style="color:var(--accent)">${nome.slice(i,i+q.length)}</strong>`+nome.slice(i+q.length);
}
function handleKey(e) {
  const list  = document.getElementById('autoList');
  const items = list ? list.querySelectorAll('.autocomplete-item') : [];
  if (!list||!list.classList.contains('open')) { if(e.key==='Enter') buscaTexto(); return; }
  if (e.key==='ArrowDown') {
    e.preventDefault(); _autoIdx=Math.min(_autoIdx+1,items.length-1);
    items.forEach((el,i)=>el.classList.toggle('active',i===_autoIdx));
  } else if (e.key==='ArrowUp') {
    e.preventDefault(); _autoIdx=Math.max(_autoIdx-1,0);
    items.forEach((el,i)=>el.classList.toggle('active',i===_autoIdx));
  } else if (e.key==='Enter') {
    if (_autoIdx>=0&&items[_autoIdx]) selecionarItem(items[_autoIdx].dataset.id); else buscaTexto();
  } else if (e.key==='Escape') { list.classList.remove('open'); }
}
function selecionarItem(id) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  document.getElementById('nomeBusca').value = p.nome;
  document.getElementById('autoList').classList.remove('open');
  mostrarResultadoConsulta(p);
}
function buscaTexto() {
  const val = (document.getElementById('nomeBusca').value||'').trim().toLowerCase(); if(!val) return;
  const p = produtos.find(x=>x.nome&&x.nome.toLowerCase().includes(val));
  if (p) selecionarItem(p.id);
  else document.getElementById('resultadoArea').innerHTML =
    `<div class="empty" style="margin-top:20px"><div class="e-icon">🔎</div><div class="e-text">Produto não encontrado</div></div>`;
}
document.addEventListener('click', e => {
  const l = document.getElementById('autoList');
  if (l&&!l.contains(e.target)&&e.target.id!=='nomeBusca') l.classList.remove('open');
});
function mostrarResultadoConsulta(p) {
  const preco = parseFloat(p.preco||0);
  let rows = `<div class="result-row"><span class="rlabel">💰 Preço</span><span class="rvalue preco">R$ ${preco.toFixed(2)}</span></div>`;
  if (p.estoque&&p.estoque.trim()) rows+=`<div class="result-row"><span class="rlabel">📦 Estoque</span><span class="rvalue estoque">${p.estoque} un.</span></div>`;
  if (p.validade&&p.validade.trim()) rows+=`<div class="result-row"><span class="rlabel">📅 Validade</span><span class="rvalue validade">${p.validade}</span></div>`;
  document.getElementById('resultadoArea').innerHTML = `
    <div class="result-card">
      <div class="result-header"><div class="result-nome">${p.nome}</div><div class="result-id">ID #${p.id}</div></div>
      <div class="result-body">${rows}</div>
    </div>`;
}

// ══════════════════════════════════
// ADMIN — senha com show/hide
// ══════════════════════════════════
function senhaHTML(fn) {
  return `<div class="pass-wrap">
    <input class="pass-input" id="senhaInput" type="password" placeholder="Senha"
      onkeydown="if(event.key==='Enter') ${fn}">
    <button class="pass-toggle" type="button" onclick="toggleSenha()">
      <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>`;
}
function toggleSenha() {
  const inp=document.getElementById('senhaInput'), ico=document.getElementById('eyeIcon'); if(!inp) return;
  if (inp.type==='password') {
    inp.type='text';
    ico.innerHTML=`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type='password';
    ico.innerHTML=`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}
function mostrarErroSenha(msg) {
  const e=document.getElementById('modalErr'); e.textContent=msg; e.style.display='block';
  document.getElementById('senhaInput').value=''; document.getElementById('senhaInput').focus();
}

function abrirAdmin() {
  if (usuarioAdmin) { mostrarAdmin(); return; }
  abrirModal({
    icon:'🔐', title:'Área Restrita', desc:'Digite a senha de administrador para continuar.',
    body: senhaHTML('confirmarSenha()'),
    actions:[
      { label:'Cancelar', cls:'btn btn-ghost',  fn:'fecharModal()' },
      { label:'Entrar',   cls:'btn btn-primary', fn:'confirmarSenha()' }
    ]
  });
}
function confirmarSenha() {
  const val=(document.getElementById('senhaInput').value||'');
  if (val===ADMIN_PASSWORD) {
    usuarioAdmin=true; fecharModal();
    document.getElementById('dAdminBadge').classList.add('show');
    document.getElementById('dn-sair').style.display='flex';
    toast('Bem-vindo, Admin!','sucesso');
    mostrarAdmin();
  } else { mostrarErroSenha('❌ Senha incorreta. Tente novamente.'); }
}

function goAdmin(tela) {
  if (!usuarioAdmin) {
    abrirModal({
      icon:'🔐', title:'Área Restrita', desc:'Esta área requer autenticação.',
      body: senhaHTML(`confirmarSenhaGo('${tela}')`),
      actions:[
        { label:'Cancelar', cls:'btn btn-ghost',  fn:'fecharModal()' },
        { label:'Entrar',   cls:'btn btn-primary', fn:`confirmarSenhaGo('${tela}')` }
      ]
    });
    return;
  }
  abrirTela(tela);
}
function confirmarSenhaGo(tela) {
  const val=(document.getElementById('senhaInput').value||'');
  if (val===ADMIN_PASSWORD) {
    usuarioAdmin=true; fecharModal();
    document.getElementById('dAdminBadge').classList.add('show');
    document.getElementById('dn-sair').style.display='flex';
    abrirTela(tela);
  } else { mostrarErroSenha('❌ Senha incorreta.'); }
}
function abrirTela(t) {
  if (t==='cadastro') mostrarCadastro();
  else if (t==='preco') mostrarAtualizarPreco();
  else if (t==='estoque') mostrarAtualizarEstoque();
  else if (t==='validade') mostrarAtualizarValidade();
  else if (t==='remover') mostrarRemover();
}

// painel admin (mobile)
function mostrarAdmin() {
  if (isDesktop()) { mostrarInicio(); return; } // no desktop usa sidebar diretamente
  setNav('admin');
  setHeader('⚙️','Administração','Gerencie seu estoque');
  setContent(`
    <p class="section-title">Produtos</p>
    <div class="menu-grid">
      <div class="menu-card" onclick="mostrarCadastro()"><span class="icon">➕</span><span class="label">Cadastrar</span><span class="desc">Novo produto</span></div>
      <div class="menu-card" onclick="mostrarRemover()"><span class="icon">🗑️</span><span class="label">Remover</span><span class="desc">Excluir produto</span></div>
    </div>
    <p class="section-title" style="margin-top:20px">Atualizar</p>
    <div class="menu-grid">
      <div class="menu-card" onclick="mostrarAtualizarPreco()"><span class="icon">💰</span><span class="label">Preço</span><span class="desc">Alterar valor</span></div>
      <div class="menu-card" onclick="mostrarAtualizarEstoque()"><span class="icon">📦</span><span class="label">Estoque</span><span class="desc">Alterar qtd.</span></div>
      <div class="menu-card wide" onclick="mostrarAtualizarValidade()">
        <span class="icon">📅</span>
        <div><span class="label">Validade</span><span class="desc" style="display:block;font-size:12px;color:var(--muted)">Alterar data de vencimento</span></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="menu-card wide danger" onclick="confirmarSairAdmin()">
      <span class="icon">🚪</span>
      <div><span class="label">Sair do Admin</span><span class="desc" style="display:block;font-size:12px;color:var(--red);opacity:.7">Encerrar sessão</span></div>
    </div>`);
}

function confirmarSairAdmin() {
  abrirModal({
    icon:'🚪', title:'Sair do Admin', desc:'Deseja encerrar a sessão administrativa?',
    actions:[
      { label:'Cancelar', cls:'btn btn-ghost',  fn:'fecharModal()' },
      { label:'Sair',     cls:'btn btn-danger', fn:'sairAdmin()' }
    ]
  });
}
function sairAdmin() {
  usuarioAdmin=false; fecharModal();
  document.getElementById('dAdminBadge').classList.remove('show');
  document.getElementById('dn-sair').style.display='none';
  mostrarInicio(); toast('Sessão encerrada','sucesso');
}

function selectOpcoes() {
  return `<option value="">Selecione um produto...</option>`+
    produtos.filter(p=>p.nome).map(p=>`<option value="${p.id}">${p.nome}</option>`).join('');
}

// ── CADASTRAR ──
function mostrarCadastro() {
  setNav('cadastro'); setHeader('➕','Novo Produto','Preencha os dados');
  setContent(`
    <div class="form-card">
      <div class="form-title">Cadastrar Produto</div>
      <div class="field"><label>Nome *</label><input type="text" id="f_nome" placeholder="Ex: Café Pilão 500g"></div>
      <div class="field"><label>Preço *</label><input type="number" id="f_preco" placeholder="0.00" step="0.01" min="0"></div>
      <div class="field"><label>Estoque</label><input type="number" id="f_estoque" placeholder="Quantidade (opcional)" min="0"></div>
      <div class="field"><label>Validade</label><input type="text" id="f_validade" placeholder="Ex: 31/12/2025"></div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="cadastrarProduto()">✅ Cadastrar</button>
      <button class="btn btn-ghost" onclick="voltarAdmin()">← Voltar</button>
    </div>`);
}
async function cadastrarProduto() {
  const nome=(document.getElementById('f_nome').value||'').trim();
  const preco=(document.getElementById('f_preco').value||'').trim();
  const estoque=(document.getElementById('f_estoque').value||'').trim();
  const validade=(document.getElementById('f_validade').value||'').trim();
  if (!nome||!preco) { toast('Nome e preço são obrigatórios!','erro'); return; }
  const novoId=produtos.length>0?(Math.max(...produtos.map(p=>Number(p.id)||0))+1).toString():'1';
  toast('Cadastrando...','sucesso');
  const ok=await salvarNoSheet({acao:'cadastrar',produtos:[{id:novoId,nome,preco,estoque:estoque||'',validade:validade||''}]});
  if (ok) { await carregarProdutos(); toast(`${nome} cadastrado!`,'sucesso'); setTimeout(mostrarInicio,1500); }
  else toast('Erro ao cadastrar.','erro');
}

// ── REMOVER ──
function mostrarRemover() {
  setNav('remover'); setHeader('🗑️','Remover Produto','Selecione para excluir');
  setContent(`
    <div class="form-card">
      <div class="form-title">Remover Produto</div>
      <div class="field"><label>Produto</label><select id="f_sel">${selectOpcoes()}</select></div>
      <button class="btn btn-danger" style="margin-top:8px" onclick="confirmarRemover()">🗑️ Remover</button>
      <button class="btn btn-ghost" onclick="voltarAdmin()">← Voltar</button>
    </div>`);
}
function confirmarRemover() {
  const id=document.getElementById('f_sel').value; if (!id) { toast('Selecione um produto!','erro'); return; }
  const p=produtos.find(x=>x.id===id);
  abrirModal({
    icon:'⚠️', title:'Confirmar Remoção', desc:`Deseja mesmo remover "${p?.nome}"? Esta ação não pode ser desfeita.`,
    actions:[
      { label:'Cancelar', cls:'btn btn-ghost',  fn:'fecharModal()' },
      { label:'Remover',  cls:'btn btn-danger', fn:`execRemover('${id}')` }
    ]
  });
}
async function execRemover(id) {
  const p=produtos.find(x=>x.id===id); fecharModal(); toast('Removendo...','sucesso');
  const ok=await salvarNoSheet({acao:'remover',produtos:[{id}]});
  if (ok) { produtos=produtos.filter(x=>x.id!==id); toast(`${p?.nome||'Produto'} removido!`,'sucesso'); setTimeout(mostrarInicio,1500); }
  else toast('Erro ao remover.','erro');
}

// ── ATUALIZAR PREÇO ──
function mostrarAtualizarPreco() {
  setNav('preco'); setHeader('💰','Atualizar Preço','Defina o novo valor');
  setContent(`
    <div class="form-card">
      <div class="form-title">Atualizar Preço</div>
      <div class="field"><label>Produto</label><select id="f_sel" onchange="preencherCampo('preco')">${selectOpcoes()}</select></div>
      <div class="field"><label>Novo Preço *</label><input type="number" id="f_val" placeholder="0.00" step="0.01" min="0"></div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="atualizarCampo('preco')">💰 Salvar</button>
      <button class="btn btn-ghost" onclick="voltarAdmin()">← Voltar</button>
    </div>`);
}

// ── ATUALIZAR ESTOQUE ──
function mostrarAtualizarEstoque() {
  setNav('estoque'); setHeader('📦','Atualizar Estoque','Defina a nova quantidade');
  setContent(`
    <div class="form-card">
      <div class="form-title">Atualizar Estoque</div>
      <div class="field"><label>Produto</label><select id="f_sel" onchange="preencherCampo('estoque')">${selectOpcoes()}</select></div>
      <div class="field"><label>Nova Quantidade</label><input type="number" id="f_val" placeholder="0" min="0"></div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="atualizarCampo('estoque')">📦 Salvar</button>
      <button class="btn btn-ghost" onclick="voltarAdmin()">← Voltar</button>
    </div>`);
}

// ── ATUALIZAR VALIDADE ──
function mostrarAtualizarValidade() {
  setNav('validade'); setHeader('📅','Atualizar Validade','Defina a nova data');
  setContent(`
    <div class="form-card">
      <div class="form-title">Atualizar Validade</div>
      <div class="field"><label>Produto</label><select id="f_sel" onchange="preencherCampo('validade')">${selectOpcoes()}</select></div>
      <div class="field"><label>Nova Validade</label><input type="text" id="f_val" placeholder="Ex: 31/12/2025"></div>
      <button class="btn btn-primary" style="margin-top:8px" onclick="atualizarCampo('validade')">📅 Salvar</button>
      <button class="btn btn-ghost" onclick="voltarAdmin()">← Voltar</button>
    </div>`);
}

function preencherCampo(campo) {
  const id=document.getElementById('f_sel').value;
  const p=produtos.find(x=>x.id===id);
  if (p) document.getElementById('f_val').value=p[campo]||'';
}
async function atualizarCampo(campo) {
  const id=(document.getElementById('f_sel').value);
  const val=(document.getElementById('f_val').value||'').trim();
  if (!id) { toast('Selecione um produto!','erro'); return; }
  const p=produtos.find(x=>x.id===id);
  toast('Salvando...','sucesso');
  const ok=await salvarNoSheet({acao:'atualizar',produtos:[{...p,[campo]:val}]});
  if (ok) { await carregarProdutos(); toast(`${p.nome} atualizado!`,'sucesso'); setTimeout(mostrarInicio,1500); }
  else toast('Erro ao salvar.','erro');
}

function voltarAdmin() {
  if (isDesktop()) mostrarInicio(); else mostrarAdmin();
}

inicializar();
</script>
